<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Digital Twin Analytics</title>
    <script>
      // GitHub Pages SPA 라우팅: 404를 index.html로 리다이렉트
      const repo = '/digital-twin-front';
      const path = window.location.pathname.replace(repo, '') || '/';
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(repo + '/?p=' + encodeURIComponent(path + search) + hash);
    </script>
  </head>
  <body></body>
</html>
